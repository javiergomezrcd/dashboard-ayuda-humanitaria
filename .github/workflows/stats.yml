name: actualizar-stats
on:
  schedule:
    - cron: "*/20 * * * *"   # cada 20 minutos
  workflow_dispatch:
  push:
    branches: [main]
permissions:
  contents: write
concurrency:
  group: stats
  cancel-in-progress: false
jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python actualizar_stats.py
      - name: commit
        run: |
          git config user.name "stats-bot"
          git config user.email "actions@users.noreply.github.com"
          git add stats.json
          git commit -m "stats auto $(date -u +%FT%TZ)" || { echo "sin cambios"; exit 0; }
          git push
